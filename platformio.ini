[platformio]
default_envs = node
src_dir = .

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
build_flags =
  -I shared/include

[env:brain]
board = m5stack-atom
build_src_filter =
  -<*>
  +<apps/brain/src/>

[env:node]
board = m5stack-atom
build_src_filter =
  -<*>
  +<apps/node/src/>
